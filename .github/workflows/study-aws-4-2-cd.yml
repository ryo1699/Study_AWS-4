name: Deploy Study AWS 4 Task 2 EC2 API

on:
  push:
    branches:
      - main
    paths:
      - "Study_AWS-4_2/api/**"
      - ".github/workflows/study-aws-4-2-cd.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  DEPLOY_BUCKET: ${{ vars.STUDY_AWS_4_2_DEPLOY_BUCKET }}
  APP_INSTANCE_ID: ${{ vars.STUDY_AWS_4_2_APP_INSTANCE_ID }}
  SERVICE_NAME: study-aws-4-task2-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package API
        run: |
          tar -czf app.tar.gz -C Study_AWS-4_2/api .

      - name: Upload artifact to S3
        run: |
          aws s3 cp app.tar.gz "s3://$DEPLOY_BUCKET/releases/${{ github.sha }}/app.tar.gz"

      - name: Deploy on EC2 through SSM
        id: ssm
        run: |
          cat > ssm-commands.json <<EOF
          {
            "commands": [
              "set -euxo pipefail",
              "aws s3 cp s3://$DEPLOY_BUCKET/releases/${{ github.sha }}/app.tar.gz /tmp/study-aws-4-task2.tar.gz",
              "sudo mkdir -p /opt/study-aws-4-task2/current",
              "sudo tar -xzf /tmp/study-aws-4-task2.tar.gz -C /opt/study-aws-4-task2/current",
              "sudo chown -R studyapi:studyapi /opt/study-aws-4-task2",
              "sudo /opt/study-aws-4-task2/venv/bin/pip install -r /opt/study-aws-4-task2/current/requirements.txt",
              "sudo systemctl restart $SERVICE_NAME",
              "sudo systemctl --no-pager --full status $SERVICE_NAME"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$APP_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Study AWS 4 Task 2 API ${{ github.sha }}" \
            --parameters file://ssm-commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "$APP_INSTANCE_ID"

      - name: Print SSM command output
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "$APP_INSTANCE_ID" \
            --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}'
